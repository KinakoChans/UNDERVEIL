<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>UNDERVEIL</title>

  <!-- Font Pixel -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Scanline CRT -->
  <div class="scanline"></div>

  <!-- Glitch Overlay -->
  <div class="glitch-overlay"></div>

  <!-- Main Container -->
  <div class="container">

    <!-- Logo -->
    <div class="title">
      UNDERVEIL
    </div>

    <!-- Greeting -->
    <div class="greeting">
      > Connection established...<br><br>
      > Welcome back, lost soul.
    </div>

    <!-- Description -->
    <div class="desc">
      UNDERVEIL is a dark retro AI chat experience hidden inside a broken timeline,
      where every choice, memory, and word echoes through the underground.
    </div>

    <!-- Enter Button -->
    <button class="enter-btn" id="enterBtn">
      ENTER
    </button>

  </div>

  <!-- Background Music -->
  <audio id="bgMusic" loop>
    <source src="assets/ambience.mp3" type="audio/mpeg">
  </audio>

  <!-- Glitch Sound -->
  <audio id="glitchSound">
    <source src="assets/glitch.mp3" type="audio/mpeg">
  </audio>

  <!-- Script -->
  <script src="script.js"></script>

</body>
</html>
