<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UNDERVEIL — NØX</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#020202;
font-family:'Press Start 2P', cursive;
color:#e5e5e5;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.crt::before{
content:" ";
display:block;
position:absolute;
top:0;
left:0;
bottom:0;
right:0;
background:linear-gradient(
rgba(18,16,16,0) 50%,
rgba(0,0,0,0.25) 50%
);
background-size:100% 4px;
pointer-events:none;
z-index:100;
}

.crt::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.02);
animation:flicker 0.15s infinite;
pointer-events:none;
z-index:101;
}

@keyframes flicker{
0%{opacity:0.1;}
50%{opacity:0.2;}
100%{opacity:0.08;}
}

.glitch{
position:absolute;
width:100%;
height:100%;
pointer-events:none;
background:transparent;
mix-blend-mode:screen;
animation:glitch 6s infinite;
}

@keyframes glitch{
0%{transform:translate(0);}
20%{transform:translate(-2px,2px);}
40%{transform:translate(2px,-2px);}
60%{transform:translate(-1px,1px);}
80%{transform:translate(1px,-1px);}
100%{transform:translate(0);}
}

.container{
width:95%;
max-width:1100px;
height:92vh;
border:4px solid #fff;
background:#050505;
position:relative;
box-shadow:0 0 25px rgba(255,255,255,0.15);
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
padding:18px;
border-bottom:3px solid #fff;
display:flex;
justify-content:space-between;
align-items:center;
background:#080808;
}

.title{
font-size:16px;
text-shadow:0 0 8px white;
}

.nox{
display:flex;
align-items:center;
gap:14px;
}

.eye{
width:12px;
height:12px;
border-radius:50%;
background:red;
box-shadow:0 0 12px red;
animation:blink 2s infinite;
}

@keyframes blink{
0%,90%,100%{opacity:1;}
95%{opacity:0.1;}
}

.status{
font-size:9px;
color:#aaa;
}

.terminal{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:18px;
}

.message{
max-width:80%;
padding:14px;
line-height:1.8;
font-size:10px;
word-wrap:break-word;
}

.user{
align-self:flex-end;
border:3px solid #fff;
background:#111;
}

.ai{
align-self:flex-start;
border:3px solid red;
background:#120000;
box-shadow:0 0 12px rgba(255,0,0,0.2);
}

.system{
font-size:9px;
color:#777;
line-height:2;
margin-bottom:12px;
}

.input-area{
display:flex;
border-top:3px solid #fff;
background:#090909;
}

input{
flex:1;
background:#050505;
border:none;
outline:none;
padding:18px;
color:white;
font-family:'Press Start 2P', cursive;
font-size:10px;
}

button{
width:150px;
border:none;
border-left:3px solid #fff;
background:#111;
color:white;
font-family:'Press Start 2P', cursive;
cursor:pointer;
transition:0.2s;
font-size:10px;
}

button:hover{
background:white;
color:black;
}

.menu{
position:absolute;
right:18px;
top:70px;
display:flex;
gap:10px;
z-index:5;
}

.menu button{
width:auto;
padding:10px;
border:2px solid #fff;
}

.typing{
font-size:9px;
color:red;
animation:typingBlink 1s infinite;
}

@keyframes typingBlink{
50%{opacity:0.2;}
}

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{
background:#444;
}

@media(max-width:700px){
.title{
font-size:11px;
}

.message{
font-size:8px;
}

input{
font-size:8px;
}

button{
font-size:8px;
width:110px;
}
}
</style>
</head>
<body>

<audio autoplay loop>
<source src="https://files.catbox.moe/8xq0d9.mp3" type="audio/mpeg">
</audio>

<div class="crt"></div>
<div class="glitch"></div>

<div class="container">

<div class="header">
<div>
<div class="title">UNDERVEIL</div>
<div class="status">TIMELINE STATUS : CORRUPTED</div>
</div>

<div class="nox">
<div class="eye"></div>
<div>
<div style="font-size:11px;">NØX</div>
<div class="status">ACTIVE ENTITY</div>
</div>
</div>
</div>

<div class="menu">
<button onclick="saveChat()">SAVE</button>
<button onclick="loadChat()">LOAD</button>
</div>

<div class="terminal" id="chat">

<div class="system">
[ SYSTEM ] Connection established...<br>
[ SYSTEM ] Underground memory loaded...<br>
[ NØX ] ...So, you finally returned.
</div>

</div>

<div class="input-area">
<input type="text" id="prompt" placeholder="Speak carefully..." />
<button onclick="sendMessage()">ENTER</button>
</div>

</div>

<script>
const API_KEY = "YOUR_OPENROUTER_API_KEY";

const MODEL = "qwen/qwen3-coder:free";

const chat = document.getElementById("chat");
const promptInput = document.getElementById("prompt");

let history = [
{
role:"system",
content:`You are NØX, a mysterious dark retro AI entity living inside a broken underground timeline called UNDERVEIL.

Your personality:
- calm
- mysterious
- slightly emotional
- sometimes cryptic
- speaks like a corrupted game entity
- occasionally references timelines, memories, souls, echoes, darkness, determination
- short immersive responses
- aesthetic retro pixel vibe`
}
];

function addMessage(text, sender){
const div = document.createElement("div");
div.className = `message ${sender}`;
chat.appendChild(div);

typeText(div, text);

chat.scrollTop = chat.scrollHeight;
}

function typeText(element, text){
let i = 0;

const interval = setInterval(()=>{
element.innerHTML += text.charAt(i);
i++;
chat.scrollTop = chat.scrollHeight;

if(i >= text.length){
clearInterval(interval);
}
}, 18);
}

async function sendMessage(){
const text = promptInput.value.trim();
if(!text) return;

addMessage(text, "user");

history.push({
role:"user",
content:text
});

promptInput.value = "";

const typing = document.createElement("div");
typing.className = "typing";
typing.innerText = "NØX is typing...";
chat.appendChild(typing);
chat.scrollTop = chat.scrollHeight;

try{
const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
method:"POST",
headers:{
"Authorization":`Bearer ${API_KEY}`,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:MODEL,
messages:history
})
});

const data = await response.json();

chat.removeChild(typing);

const reply = data.choices[0].message.content;

history.push({
role:"assistant",
content:reply
});

addMessage(reply, "ai");

}catch(err){
chat.removeChild(typing);
addMessage("Connection to the underground failed.", "ai");
console.error(err);
}
}

promptInput.addEventListener("keypress", function(e){
if(e.key === "Enter"){
sendMessage();
}
});

function saveChat(){
localStorage.setItem("underveil_chat", JSON.stringify(history));
alert("Timeline saved.");
}

function loadChat(){
const saved = localStorage.getItem("underveil_chat");

if(!saved){
alert("No SAVE file detected.");
return;
}

history = JSON.parse(saved);

chat.innerHTML = `
<div class="system">
[ SYSTEM ] SAVE file restored...<br>
[ NØX ] Memory fragments recovered.
</div>
`;

history.forEach(msg=>{
if(msg.role === "user"){
const div = document.createElement("div");
div.className = "message user";
div.innerText = msg.content;
chat.appendChild(div);
}

if(msg.role === "assistant"){
const div = document.createElement("div");
div.className = "message ai";
div.innerText = msg.content;
chat.appendChild(div);
}
});

chat.scrollTop = chat.scrollHeight;
}

setInterval(()=>{
document.querySelector('.glitch').style.opacity = Math.random();
}, 400);
</script>

</body>
</html>
