<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>UNDERVEIL</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:#e5e5e5;
    font-family:'Press Start 2P', cursive;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Background pixel glow */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at center,
    rgba(120,120,120,0.08),
    transparent 60%);
    animation:pulse 4s infinite;
}

@keyframes pulse{
    0%{opacity:0.3;}
    50%{opacity:1;}
    100%{opacity:0.3;}
}

.container{
    text-align:center;
    z-index:2;
    padding:20px;
}

.title{
    font-size:38px;
    color:white;
    text-shadow:
    0 0 5px white,
    0 0 15px #888;
    margin-bottom:30px;
    animation:flicker 2s infinite;
}

@keyframes flicker{
    0%,18%,22%,25%,53%,57%,100%{
        opacity:1;
    }
    20%,24%,55%{
        opacity:0.5;
    }
}

.greeting{
    font-size:12px;
    color:#bdbdbd;
    margin-bottom:25px;
    line-height:2;
}

.desc{
    font-size:10px;
    color:#777;
    max-width:700px;
    line-height:2;
    margin:auto;
}

.enter-btn{
    margin-top:40px;
    padding:14px 28px;
    border:3px solid #e5e5e5;
    background:transparent;
    color:white;
    font-family:'Press Start 2P', cursive;
    cursor:pointer;
    transition:0.2s;
}

.enter-btn:hover{
    background:white;
    color:black;
    box-shadow:0 0 15px white;
}

.scanline{
    position:absolute;
    width:100%;
    height:100%;
    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events:none;
    z-index:1;
}
</style>
</head>
<body>

<div class="scanline"></div>

<div class="container">

    <div class="title">
        UNDERVEIL
    </div>

    <div class="greeting">
        > Connection established...<br><br>
        > Welcome back, lost soul.
    </div>

    <div class="desc">
        UNDERVEIL is a dark retro AI chat experience hidden inside a broken timeline,
        where every choice, memory, and word echoes through the underground.
    </div>

    <button class="enter-btn">
        ENTER
    </button>

</div>

</body>
</html>
