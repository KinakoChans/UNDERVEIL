<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>UNDERVEIL</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* =========================
   BODY
========================= */

body{
    background:#050505;
    color:#e5e5e5;

    font-family:'Press Start 2P', cursive;

    height:100vh;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;
}

/* =========================
   BACKGROUND GLOW
========================= */

body::before{

    content:"";

    position:absolute;

    width:100%;
    height:100%;

    background:
    radial-gradient(
        circle at center,
        rgba(120,120,120,0.08),
        transparent 60%
    );

    animation:pulse 4s infinite;
}

/* Glow Animation */

@keyframes pulse{

    0%{
        opacity:0.3;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:0.3;
    }
}

/* =========================
   CRT SCANLINE
========================= */

.scanline{

    position:absolute;

    width:100%;
    height:100%;

    background:
    repeating-linear-gradient(
        to bottom,

        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,

        transparent 1px,
        transparent 3px
    );

    pointer-events:none;

    z-index:1;
}

/* =========================
   CONTAINER
========================= */

.container{

    text-align:center;

    z-index:2;

    padding:20px;

    width:90%;
    max-width:900px;
}

/* =========================
   TITLE
========================= */

.title{

    font-size:38px;

    color:white;

    text-shadow:
    0 0 5px white,
    0 0 15px #888;

    margin-bottom:30px;

    animation:flicker 2s infinite;
}

/* Flicker Animation */

@keyframes flicker{

    0%,18%,22%,25%,53%,57%,100%{
        opacity:1;
    }

    20%,24%,55%{
        opacity:0.5;
    }
}

/* =========================
   GREETING
========================= */

.greeting{

    font-size:12px;

    color:#bdbdbd;

    margin-bottom:25px;

    line-height:2;
}

/* =========================
   DESCRIPTION
========================= */

.desc{

    font-size:10px;

    color:#777;

    max-width:700px;

    line-height:2;

    margin:auto;
}

/* =========================
   ENTER BUTTON
========================= */

.enter-btn{

    margin-top:40px;

    padding:14px 28px;

    border:3px solid #e5e5e5;

    background:transparent;

    color:white;

    font-family:'Press Start 2P', cursive;

    cursor:pointer;

    transition:0.2s;
}

/* Hover */

.enter-btn:hover{

    background:white;

    color:black;

    box-shadow:
    0 0 15px white;
}

/* =========================
   BOOT SCREEN
========================= */

.boot-screen{

    width:100%;
    height:100vh;

    background:black;

    color:#b30000;

    display:flex;

    justify-content:center;
    align-items:center;

    padding:40px;

    font-size:11px;

    line-height:2;

    text-shadow:0 0 10px red;

    animation:flickerBoot 0.15s infinite;
}

@keyframes flickerBoot{

    0%{
        opacity:1;
    }

    50%{
        opacity:0.94;
    }

    100%{
        opacity:1;
    }
}

/* =========================
   GLITCH EFFECT
========================= */

.glitch{

    animation:glitch 0.12s infinite;
}

@keyframes glitch{

    0%{
        transform:translate(0px);
        filter:hue-rotate(0deg);
    }

    20%{
        transform:translate(-2px,2px);
    }

    40%{
        transform:translate(2px,-2px);
    }

    60%{
        transform:translate(-1px,1px);
    }

    80%{
        transform:translate(1px,-1px);
    }

    100%{
        transform:translate(0px);
        filter:hue-rotate(10deg);
    }
}

/* =========================
   TERMINAL CURSOR
========================= */

.cursor{

    display:inline-block;

    width:10px;
    height:14px;

    background:#b30000;

    margin-left:8px;

    animation:blink 0.7s infinite;

    display:inline;
    vertical-align:bottom;
}

@keyframes blink{

    0%{
        opacity:1;
    }

    50%{
        opacity:0;
    }

    100%{
        opacity:1;
    }
}
   
/* =========================
   RESPONSIVE
========================= */

@media(max-width:700px){

    .title{
        font-size:24px;
    }

    .greeting{
        font-size:9px;
    }

    .desc{
        font-size:8px;
    }

    .enter-btn{
        font-size:8px;
        padding:12px 18px;
    }

    .boot-screen{
        font-size:8px;
    }
}

/* =========================
   TERMINAL INPUT & BUTTON
========================= */

.terminal-input{
    background:black;
    color:#ff2b2b;
    border:1px solid #ff2b2b;
    padding:10px;
    font-family:'Press Start 2P', monospace;
    font-size:10px;
    outline:none;
    width:220px;
    text-transform:uppercase;
    box-shadow:0 0 8px rgba(255,0,0,0.3);
}

.terminal-input:focus{
    box-shadow:0 0 15px rgba(255,0,0,0.6);
}

.terminal-btn{
    margin-top:10px;
    padding:10px 18px;
    background:black;
    color:#ff2b2b;
    border:1px solid #ff2b2b;
    font-family:'Press Start 2P', monospace;
    font-size:10px;
    cursor:pointer;
    transition:0.2s;
    letter-spacing:1px;
}

.terminal-btn:hover{
    background:#ff2b2b;
    color:black;
    box-shadow:0 0 15px red;
}

/* =========================
   UNDERVEIL CHAT UI
========================= */

.chat-container{
    width:100%;
    height:100vh;
    background:#050505;
    color:#d8d8d8;
    font-family:'Press Start 2P', cursive;
    display:flex;
    flex-direction:column;
    position:relative;
    overflow:hidden;
}

/* =========================
   CORRUPTED NOISE
========================= */

.chat-container::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:url("https://i.imgur.com/8QfQ5QY.png");
    opacity:0.03;
    pointer-events:none;
    animation:noiseMove 0.15s infinite;
}

/* =========================
   SCREEN FLICKER
========================= */

.chat-container::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
   
    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.02),
        rgba(255,255,255,0.02) 1px,
        transparent 1px,
        transparent 3px
    );

    mix-blend-mode:overlay;
    pointer-events:none;
}

/* =========================
   NOISE ANIMATION
========================= */

@keyframes noiseMove{

    0%{
        transform:translate(0,0);
    }

    25%{
        transform:translate(-1px,1px);
    }

    50%{
        transform:translate(1px,-1px);
    }

    75%{
        transform:translate(-1px,-1px);
    }

    100%{
        transform:translate(0,0);
    }
}

/* =========================
   HEADER
========================= */

.chat-header{
    padding:16px;
    border-bottom:1px solid rgba(255,255,255,0.08);
    font-size:11px;
    letter-spacing:2px;
    color:white;
    text-shadow:
    0 0 5px rgba(255,255,255,0.3);
    animation:flicker 3s infinite;
    z-index:2;
}

/* =========================
   LORE TEXT
========================= */

.chat-subheader{
    padding:14px;
    font-size:8px;
    line-height:1.8;
    color:#7a7a7a;
    border-bottom:1px solid rgba(255,255,255,0.05);
    z-index:2;
}

/* =========================
   CHAT AREA
========================= */

.chat-box{
    flex:1;
    padding:18px;
    overflow-y:auto;
    font-size:10px;
    line-height:2;
    z-index:2;
}

/* =========================
   MESSAGE STYLE
========================= */

.message{
    margin-bottom:18px;
    animation:messageFade 0.3s ease;
}

.ai{
    color:#dcdcdc;
    text-shadow:
    0 0 5px rgba(255,255,255,0.08);
}

.user{
    color:#8f8f8f;
    text-align:right;
}

/* =========================
   MESSAGE FADE
========================= */

@keyframes messageFade{

    from{
        opacity:0;
        transform:translateY(5px);
    }

    to{
        opacity:1;
        transform:translateY(0px);
    }
}

/* =========================
   INPUT AREA
========================= */

.chat-input-area{
    display:flex;
    border-top:1px solid rgba(255,255,255,0.08);
    z-index:2;
}

/* =========================
   INPUT
========================= */

.terminal-input{
    flex:1;
    background:#0a0a0a;
    border:none;
    color:#dcdcdc;
    padding:16px;
    font-family:'Press Start 2P';
    font-size:9px;
    outline:none;
    text-transform:uppercase;
}

/* =========================
   SEND BUTTON
========================= */

.terminal-btn{
    width:110px;
    background:#111;
    color:#dcdcdc;
    border:none;
    border-left:1px solid rgba(255,255,255,0.08);
    font-family:'Press Start 2P';
    font-size:9px;
    cursor:pointer;
    transition:0.2s;
}

.terminal-btn:hover{
    background:white;
    color:black;
}

/* =========================
   GLOW TEXT
========================= */

.glow{
    animation:flicker 2s infinite;
}

/* =========================
   FLICKER
========================= */

@keyframes flicker{

    0%,18%,22%,25%,53%,57%,100%{
        opacity:1;
    }

    20%,24%,55%{
        opacity:0.5;
    }
       }

/* SYSTEM CORRUPTED MESSAGE */
.corrupted{
    color:#ff2b2b;
    text-shadow:
    0 0 5px red,
    0 0 10px darkred,
    2px 0 #ff000055,
    -2px 0 #ffffff22;

    animation:corruptGlitch 0.08s infinite;
}

/* GLITCH SHAKE */
@keyframes corruptGlitch{

    0%{
        transform:translate(0px);
    }

    20%{
        transform:translate(-1px,1px);
    }

    40%{
        transform:translate(1px,-1px);
    }

    60%{
        transform:translate(-2px,0px);
    }

    80%{
        transform:translate(2px,1px);
    }

    100%{
        transform:translate(0px);
    }
}
   
</style>
</head>

            setTimeout(() => {

            }, 800);

            return;
        }

        const text = lines[lineIndex];

        // 🔥 buat line baru
        if(charIndex === 0){

            currentLineEl = document.createElement("div");
            bootText.appendChild(currentLineEl);

            // cursor selalu nempel di line aktif
            currentLineEl.appendChild(cursor);
        }

        // 🔥 kalau line selesai
        if(charIndex >= text.length){

            lineIndex++;
            charIndex = 0;
            setTimeout(type, 400);
            return;
        }

        // 🔥 ngetik karakter per karakter (aman, tidak rusak)
        const charNode = document.createTextNode(text.charAt(charIndex));
        currentLineEl.insertBefore(charNode, cursor);

        charIndex++;

        setTimeout(type, 35);
    }

    type();
}

    const u = document.getElementById("username").value.trim();

    if(u === "" && p === ""){

        return;
    }

    // =========================

        showError("PASSWORD IS REQUIRED");
        return;
    }

    // =========================

    if(u === "NOX" && p === "nox123"){
        setState("chat");
    } else {
        showError("INVALID USERNAME / PASSWORD");
    }
}
   
// =========================

    document.getElementById("error").textContent = msg;

    document.body.style.animation = "glitch 0.1s infinite";

    setTimeout(() => {
        document.body.style.animation = "";

        charIndex++;
        setTimeout(type, 40);
    }

    type();

// =========================
// ENTITY CHAT SEQUENCE
// =========================

function startEntityChat(){

    const chatBox =
    document.getElementById("chatBox");

    // =========================
    // CREATE MESSAGE
    // =========================

    function createMessage(text, className = "ai"){

        return new Promise((resolve) => {

            const msg =
            document.createElement("div");

            msg.className =
            "message " + className;

            chatBox.appendChild(msg);

            let i = 0;

            // cursor putih
            const cursor =
            document.createElement("span");

            cursor.className = "cursor";

            cursor.style.background = "white";

            cursor.textContent = "█";

            msg.appendChild(cursor);

            function typing(){

                if(i >= text.length){

                    resolve();
                    return;
                }

                const node =
                document.createTextNode(
                    text.charAt(i)
                );

                msg.insertBefore(node, cursor);

                i++;

                // SUPER LAMBAT
                setTimeout(typing, 90);
            }

            typing();
        });
    }

    // =========================
    // DOT LOADING
    // =========================

    function corruptedLoading(){

        return new Promise((resolve) => {

            const msg =
            document.createElement("div");

            msg.className =
            "message corrupted";

            chatBox.appendChild(msg);

            let dots = 0;
            let loops = 0;

            function animate(){

                if(dots > 3){

                    dots = 0;
                    loops++;
                }

                msg.textContent =
                "[ SYSTEM ] : corrupted memories detected" +
                ".".repeat(dots);

                dots++;

                // selesai
                if(loops >= 4){

                    screenGlitch();

                    resolve();
                    return;
                }

                setTimeout(animate, 550);
            }

            animate();
        });
    }

    // =========================
    // BIG GLITCH EFFECT
    // =========================

    function screenGlitch(){

        document.body.classList.add("glitch");

        setTimeout(() => {

            document.body.classList.remove("glitch");

        }, 1800);
    }

    // =========================
    // RUN SEQUENCE
    // =========================

    async function run(){

        await createMessage(
            "[ NØX ] : ...you finally returned."
        );

        await new Promise(r =>
            setTimeout(r, 2400)
        );

        await createMessage(
            "[ NØX ] : this timeline is unstable."
        );

        );
