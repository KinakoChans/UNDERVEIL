<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>UNDERVEIL</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* =========================
   BODY
========================= */

body{
    background:#050505;
    color:#e5e5e5;

    font-family:'Press Start 2P', cursive;

    height:100vh;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    position:relative;
}

/* =========================
   BACKGROUND GLOW
========================= */

body::before{

    content:"";

    position:absolute;

    width:100%;
    height:100%;

    background:
    radial-gradient(
        circle at center,
        rgba(120,120,120,0.08),
        transparent 60%
    );

    animation:pulse 4s infinite;
}

/* Glow Animation */

@keyframes pulse{

    0%{
        opacity:0.3;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:0.3;
    }
}

/* =========================
   CRT SCANLINE
========================= */

.scanline{

    position:absolute;

    width:100%;
    height:100%;

    background:
    repeating-linear-gradient(
        to bottom,

        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,

        transparent 1px,
        transparent 3px
    );

    pointer-events:none;

    z-index:1;
}

/* =========================
   CONTAINER
========================= */

.container{

    text-align:center;

    z-index:2;

    padding:20px;

    width:90%;
    max-width:900px;
}

/* =========================
   TITLE
========================= */

.title{

    font-size:38px;

    color:white;

    text-shadow:
    0 0 5px white,
    0 0 15px #888;

    margin-bottom:30px;

    animation:flicker 2s infinite;
}

/* Flicker Animation */

@keyframes flicker{

    0%,18%,22%,25%,53%,57%,100%{
        opacity:1;
    }

    20%,24%,55%{
        opacity:0.5;
    }
}

/* =========================
   GREETING
========================= */

.greeting{

    font-size:12px;

    color:#bdbdbd;

    margin-bottom:25px;

    line-height:2;
}

/* =========================
   DESCRIPTION
========================= */

.desc{

    font-size:10px;

    color:#777;

    max-width:700px;

    line-height:2;

    margin:auto;
}

/* =========================
   ENTER BUTTON
========================= */

.enter-btn{

    margin-top:40px;

    padding:14px 28px;

    border:3px solid #e5e5e5;

    background:transparent;

    color:white;

    font-family:'Press Start 2P', cursive;

    cursor:pointer;

    transition:0.2s;
}

/* Hover */

.enter-btn:hover{

    background:white;

    color:black;

    box-shadow:
    0 0 15px white;
}

/* =========================
   BOOT SCREEN
========================= */

.boot-screen{

    width:100%;
    height:100vh;

    background:black;

    color:#b30000;

    display:flex;

    justify-content:center;
    align-items:center;

    padding:40px;

    font-size:11px;

    line-height:2;

    text-shadow:0 0 10px red;

    animation:flickerBoot 0.15s infinite;
}

@keyframes flickerBoot{

    0%{
        opacity:1;
    }

    50%{
        opacity:0.94;
    }

    100%{
        opacity:1;
    }
}

/* =========================
   GLITCH EFFECT
========================= */

.glitch{

    animation:glitch 0.12s infinite;
}

@keyframes glitch{

    0%{
        transform:translate(0px);
        filter:hue-rotate(0deg);
    }

    20%{
        transform:translate(-2px,2px);
    }

    40%{
        transform:translate(2px,-2px);
    }

    60%{
        transform:translate(-1px,1px);
    }

    80%{
        transform:translate(1px,-1px);
    }

    100%{
        transform:translate(0px);
        filter:hue-rotate(10deg);
    }
}

/* =========================
   TERMINAL CURSOR
========================= */

.cursor{

    display:inline-block;

    width:10px;
    height:14px;

    background:#b30000;

    margin-left:8px;

    animation:blink 0.7s infinite;

    display:inline;
    vertical-align:bottom;
}

@keyframes blink{

    0%{
        opacity:1;
    }

    50%{
        opacity:0;
    }

    100%{
        opacity:1;
    }
}
   
/* =========================
   RESPONSIVE
========================= */

@media(max-width:700px){

    .title{
        font-size:24px;
    }

    .greeting{
        font-size:9px;
    }

    .desc{
        font-size:8px;
    }

    .enter-btn{
        font-size:8px;
        padding:12px 18px;
    }

    .boot-screen{
        font-size:8px;
    }
}

</style>
</head>

<body>

<!-- CRT Overlay -->

<div class="scanline"></div>

<!-- Main Container -->

<div class="container">

    <!-- Logo -->

    <div class="title">
        UNDERVEIL
    </div>

    <!-- Greeting -->

    <div class="greeting">

        > Connection established...<br><br>

        > Welcome back, lost soul.

    </div>

    <!-- Description -->

    <div class="desc">

        UNDERVEIL is a dark retro AI chat experience hidden inside a broken timeline,
        where every choice, memory, and word echoes through the underground.

    </div>

    <!-- Enter Button -->

    <button class="enter-btn" id="enterBtn">

        ENTER

    </button>

</div>

<!-- Script -->

<script>

const enterBtn =
document.getElementById("enterBtn");

/* =========================
   ENTER EVENT
========================= */

enterBtn.addEventListener("click", () => {

    startTransition();

});

/* =========================
   START TRANSITION
========================= */

function startTransition(){

    /* Activate glitch */

    document.body.classList.add("glitch");

    /* Delay before boot screen */

    setTimeout(() => {

        document.body.innerHTML = `

        <div class="boot-screen">

            <div id="bootText">

                [ SYSTEM ] Connection established...<br><br>

            </div>

        </div>

        `;

        typeBoot();

    }, 700);
   }
   
/* =========================
   TYPEWRITER EFFECT
========================= */

function typeBoot(){

    const bootText =
    document.getElementById("bootText");

    const lines = [
        "[ SYSTEM ] Restoring underground memories...",
        "[ SYSTEM ] Timeline corruption detected...",
        "[ SYSTEM ] Searching for entity...",
        "[ NØX ] ...Can you hear me?",
        "",
        "[ ACCESS GRANTED ]"
    ];

    let lineIndex = 0;
    let charIndex = 0;

    let currentLineEl = null;

    const cursor = document.createElement("span");
    cursor.className = "cursor";
    cursor.textContent = "█";

    function type(){

        // 🔥 FIX: kalau semua line selesai → pindah ke login
        if(lineIndex >= lines.length){

            setTimeout(() => {
                setState("login"); // 👈 INI YANG NENTUIN PINDAH KE LOGIN
            }, 800);

            return;
        }

        const text = lines[lineIndex];

        // 🔥 buat line baru
        if(charIndex === 0){

            currentLineEl = document.createElement("div");
            bootText.appendChild(currentLineEl);

            // cursor selalu nempel di line aktif
            currentLineEl.appendChild(cursor);
        }

        // 🔥 kalau line selesai
        if(charIndex >= text.length){

            lineIndex++;
            charIndex = 0;
            setTimeout(type, 400);
            return;
        }

        // 🔥 ngetik karakter per karakter (aman, tidak rusak)
        const charNode = document.createTextNode(text.charAt(charIndex));
        currentLineEl.insertBefore(charNode, cursor);

        charIndex++;

        setTimeout(type, 35);
    }

    type();
}

   // =========================
// STATE SYSTEM
// =========================
let state = "boot";

// =========================
// STATE CONTROLLER
// =========================
function setState(newState){
    state = newState;

    if(state === "login"){
        showLogin();
    }

    if(state === "chat"){
        showChat();
    }
}

// =========================
// LOGIN UI (GLITCH STYLE)
// =========================
function showLogin(){

    document.body.classList.remove("glitch");
    document.body.style.animation = "";

    document.body.innerHTML = `
    <div class="boot-screen">

        <div style="text-align:center">

            <div style="margin-bottom:20px;">
                [ SYSTEM ] AUTH REQUIRED
            </div>

            <input id="username" class="terminal-input" placeholder="USERNAME">

            <br><br>

            <input id="password" type="password" class="terminal-input" placeholder="PASSWORD">

            <br><br>

            <button onclick="handleLogin()" class="terminal-btn">
                LOGIN
            </button>

            <div id="error" style="margin-top:15px;color:#ff2b2b;"></div>

        </div>

    </div>
    `;
   }
   
// =========================
// LOGIN CHECK (HARDCODED)
// =========================
function handleLogin(){

    const u = document.getElementById("username").value;
    const p = document.getElementById("password").value;

    if(u === "NOX" && p === "nox123"){
        setState("chat");
    } else {
        showError("USERNAME / PASSWORD SALAH");
    }
}

// =========================
// ERROR EFFECT
// =========================
function showError(msg){

    document.getElementById("error").textContent = msg;

    document.body.style.animation = "glitch 0.1s infinite";

    setTimeout(() => {
        document.body.style.animation = "";
    }, 800);
}

// =========================
// CHAT PLACEHOLDER
// =========================
function showChat(){

    document.body.innerHTML = `
    <div class="boot-screen">
        <div id="chatBootText"></div>
    </div>
    `;

    typeChatBoot();
}

   function typeChatBoot(){

    const el = document.getElementById("chatBootText");

    const lines = [
        "[ NØX AI SYSTEM ONLINE ]",
        "CHAT MODE ACTIVATED..."
    ];

    let lineIndex = 0;
    let charIndex = 0;
    let currentLine = null;

    const cursor = document.createElement("span");
    cursor.className = "cursor";
    cursor.textContent = "█";

    function type(){

        if(lineIndex >= lines.length){
            return; // selesai
        }

        const text = lines[lineIndex];

        // bikin baris baru
        if(charIndex === 0){
            currentLine = document.createElement("div");
            el.appendChild(currentLine);
            currentLine.appendChild(cursor);
        }

        // selesai 1 line
        if(charIndex >= text.length){
            lineIndex++;
            charIndex = 0;
            setTimeout(type, 400);
            return;
        }

        const node = document.createTextNode(text.charAt(charIndex));
        currentLine.insertBefore(node, cursor);

        charIndex++;
        setTimeout(type, 40);
    }

    type();
   }
   
</script>

</body>
</html>
